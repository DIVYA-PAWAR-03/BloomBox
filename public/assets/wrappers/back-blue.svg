<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="backGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f9ff" />
      <stop offset="100%" stop-color="#bae6fd" />
    </linearGradient>
    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3.5" stdDeviation="3.2" flood-color="#44382e" flood-opacity="0.12" />
    </filter>
  </defs>
  <!-- Left fanning backing paper fold -->
  <path d="M 50 85 L 16 50 C 11 38, 25 24, 40 30 L 50 58 Z" fill="url(#backGrad)" filter="url(#softShadow)" />
  <!-- Right fanning backing paper fold -->
  <path d="M 50 85 L 84 50 C 89 38, 75 24, 60 30 L 50 58 Z" fill="url(#backGrad)" filter="url(#softShadow)" />
  <!-- Center fanning backing paper fold -->
  <path d="M 50 85 L 26 42 C 32 30, 68 30, 74 42 Z" fill="url(#backGrad)" filter="url(#softShadow)" />

  <!-- Shading creases and highlights -->
  <path d="M 50 85 L 40 30" stroke="rgba(3, 105, 161, 0.16)" stroke-width="0.75" fill="none" opacity="0.6" />
  <path d="M 50 85 L 60 30" stroke="rgba(3, 105, 161, 0.16)" stroke-width="0.75" fill="none" opacity="0.6" />
  <path d="M 50 85 L 26 42" stroke="rgba(255, 255, 255, 0.7)" stroke-width="0.75" fill="none" opacity="0.7" />
  <path d="M 50 85 L 74 42" stroke="rgba(255, 255, 255, 0.7)" stroke-width="0.75" fill="none" opacity="0.7" />
</svg>
