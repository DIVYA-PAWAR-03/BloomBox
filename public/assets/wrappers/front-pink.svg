<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="frontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1f2" />
      <stop offset="100%" stop-color="#fda4af" />
    </linearGradient>
    <filter id="foldShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.2" flood-color="#44382e" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Overlapping front folds wrapping the stems -->
  <!-- Left folding flap -->
  <path d="M 50 85 L 24 58 C 28 51, 44 52, 50 56 Z" fill="url(#frontGrad)" filter="url(#foldShadow)" />
  <!-- Right folding flap -->
  <path d="M 50 85 L 76 58 C 72 51, 56 52, 50 56 Z" fill="url(#frontGrad)" filter="url(#foldShadow)" />
  <!-- Main front wrap body collar -->
  <path d="M 30 64 C 38 58, 62 58, 70 64 L 50 85 Z" fill="url(#frontGrad)" filter="url(#foldShadow)" opacity="0.96" />

  <!-- Crease shading and highlights -->
  <path d="M 50 85 L 24 58" stroke="rgba(255, 255, 255, 0.7)" stroke-width="0.8" fill="none" opacity="0.65" />
  <path d="M 50 85 L 76 58" stroke="rgba(225, 29, 72, 0.18)" stroke-width="0.8" fill="none" opacity="0.5" />
  <path d="M 30 64 C 38 58, 62 58, 70 64" stroke="rgba(255, 255, 255, 0.7)" stroke-width="0.75" fill="none" opacity="0.5" />
</svg>
