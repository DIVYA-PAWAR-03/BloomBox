<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bearBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#78350f" />
    </radialGradient>
  </defs>
  <!-- Teddy Bear Body -->
  <!-- Ears -->
  <circle cx="32" cy="32" r="12" fill="url(#bearBody)" stroke="#451a03" stroke-width="1" />
  <circle cx="32" cy="32" r="6" fill="#fbcfe8" />
  
  <circle cx="68" cy="32" r="12" fill="url(#bearBody)" stroke="#451a03" stroke-width="1" />
  <circle cx="68" cy="32" r="6" fill="#fbcfe8" />
  
  <!-- Main Head -->
  <circle cx="50" cy="48" r="26" fill="url(#bearBody)" stroke="#451a03" stroke-width="1.5" />
  
  <!-- Muzzle -->
  <ellipse cx="50" cy="56" rx="12" ry="8" fill="#fef3c7" />
  <!-- Nose -->
  <polygon points="50,52 46,48 54,48" fill="#1c1917" />
  <line x1="50" y1="52" x2="50" y2="58" stroke="#1c1917" stroke-width="1.5" />
  
  <!-- Eyes -->
  <circle cx="40" cy="44" r="3.5" fill="#1c1917" />
  <circle cx="40.5" cy="43" r="1" fill="#ffffff" />
  
  <circle cx="60" cy="44" r="3.5" fill="#1c1917" />
  <circle cx="60.5" cy="43" r="1" fill="#ffffff" />
  
  <!-- Blush Cheeks -->
  <circle cx="35" cy="52" r="3" fill="#fda4af" opacity="0.6" />
  <circle cx="65" cy="52" r="3" fill="#fda4af" opacity="0.6" />
</svg>
