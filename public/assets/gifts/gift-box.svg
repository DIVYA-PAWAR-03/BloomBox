<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
  </defs>
  <!-- Box body -->
  <rect x="25" y="40" width="50" height="42" rx="4" fill="url(#boxGrad)" stroke="#1e1b4b" stroke-width="1.5" />
  <!-- Box lid -->
  <rect x="22" y="32" width="56" height="12" rx="2" fill="url(#lidGrad)" stroke="#1e1b4b" stroke-width="1.5" />
  <!-- Gold Ribbon vertically -->
  <rect x="46" y="32" width="8" height="50" fill="#fbbf24" stroke="#d97706" stroke-width="0.5" />
  <!-- Gold Ribbon horizontally -->
  <rect x="25" y="58" width="50" height="8" fill="#fbbf24" stroke="#d97706" stroke-width="0.5" />
  <!-- Bow loops on top -->
  <path d="M 50,32 C 40,15 25,25 45,30 Z" fill="#fbbf24" stroke="#d97706" stroke-width="0.5" />
  <path d="M 50,32 C 60,15 75,25 55,30 Z" fill="#fbbf24" stroke="#d97706" stroke-width="0.5" />
</svg>
