  <!-- Chocolate segments -->
  <g fill="#7c2d12" stroke="#451a03" stroke-width="0.5">
    <rect x="30" y="25" width="18" height="10" rx="1" />
    <rect x="52" y="25" width="18" height="10" rx="1" />
    
    <rect x="30" y="38" width="18" height="10" rx="1" />
    <rect x="52" y="38" width="18" height="10" rx="1" />
    
    <rect x="30" y="51" width="18" height="10" rx="1" />
    <rect x="52" y="51" width="18" height="10" rx="1" />
  </g>
  <!-- Foil wrapper half-torn -->
  <path d="M 23,45 L 77,45 L 75,82 C 75,84 25,84 25,82 Z" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1" />
